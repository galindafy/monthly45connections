<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connections Monthly 45x45</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
<header>
<h1>Connections</h1>
<p id="puzzle"></p>
</header>

<div class="stats">
<div>Score: <span id="score">0</span></div>
<div>Mistakes: <span id="mistakes">0</span>/4</div>
<div>Streak: <span id="streak">0</span></div>
</div>

<div id="status"></div>
<div id="solved"></div>
<div id="board"></div>

<div class="controls">
<button id="shuffleBtn">Shuffle</button>
<button id="deselectBtn">Deselect</button>
<button id="newBtn">Reload</button>
</div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
