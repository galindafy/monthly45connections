<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections 45×45</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Connections</h1>
      <p class="subtitle">Weekly 45×45</p>
    </header>
    <section class="controls">
      <button id="shuffleBtn" type="button">Shuffle</button>
      <button id="deselectBtn" type="button">Deselect</button>
    </section>
    <section class="status">
      <div>Week of: <span id="puzzleDate">—</span></div>
      <div>Mistakes: <span id="mistakes">0</span></div>
      <div>Groups: <span id="groupCount">0</span></div>
    </section>
    <section id="board" class="board" aria-label="Puzzle board"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
