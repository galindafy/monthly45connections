<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connections Weekly 45x45</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Connections</h1>
      <div class="subtitle">Weekly 45x45</div>
    </div>

    <div class="status" aria-live="polite">
      <span id="currentWeek">Week —</span>
      <span>•</span>
      <span id="mistakes">Mistakes: 0</span>
      <span>•</span>
      <span id="points">Points: 0</span>
    </div>

    <div class="controls">
      <button id="shuffleBtn" type="button">Shuffle</button>
    </div>

    <div class="board"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
